name: Daily Data Refresh

on:
  schedule:
    # Run daily at 6 AM UTC (10 PM PST / 11 PM PDT)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh cache files
        env:
          CU_METADATA_SOURCE_TOKEN: ${{ secrets.CU_METADATA_SOURCE_TOKEN }}
          HIVE_BRAIN_GH_TOKEN_DFO_PAC_SCI: ${{ secrets.HIVE_BRAIN_GH_TOKEN_DFO_PAC_SCI }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          chmod +x ./update-agent.sh
          ./update-agent.sh

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-refresh data cache [skip ci]"
          git push
